<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .out_box{
            width: 1200px;
            height: 400px;
            background-color: yellowgreen;
            margin: 50px auto;
            position: relative;
        }
        .box{
            width: 300px;
            height: 300px;
            background-color: violet;
            border: 5px solid black;
            box-sizing: border-box;
            font-size: 100px;
            text-align: center;
            line-height: 300px;
            position: absolute;
            /* =>부모의 왼쪽 상단점을 0,0 기준 */
        }

        .box_1{
            top:50px;
            left: 50px;
        }
        .box_2{
            top:50px;
            right: 50px;
        }
        .box_3{
            top:50px;
            left: 100px;
        }
        .box_4{
            /* top:50px;
            left: 450px; */
            /* 부모 안에서 중앙 */
            /* margin: 0 auto;
            =>상대값
            =>position: absolute 절대값(우선) */
            /* position: fixed,
            position: absolute 일때 
            부모 영역안에서 가로(left)세로(top) 중앙 정렬규칙 */
            top:calc(50% - 150px);
             /* top:50%;
            margin-top: -150px; */
            left:calc(50% - 150px);
            /* left:50%;
            margin-left: -150px; */
           
        }
        .box_5{
            top:50px;
            right: 100px;
        }
        .box_6{
            left: 50px;
            bottom: 80px;
        }
        .box_7{
            top:80px;
            left: calc(50% - 150px);
        }
        .box_8{
            right: 50px;
            bottom: 80px;
        }
        .box_9{
            left: 200px;
            top:50px;
        }
        .box_10{
            left:450px;
            top:80px;
        }
        .box_11{
            right: 240px;
            top:50px;
        }
        .box_12{
            right: 50px;
            top:80px;
        }
      
    </style>
</head>
<body>
    <!-- out_box 4개 지정
    =>가로 중앙정렬 위아래 50px
    =>크기 1200*400
    =>배경색 지정 -->
    <!-- 각 out_box자식요소로 box를 지정
    =>가로세로 300*300 -->
    <div class="out_box">
        <div class="box box_1">1</div>
        <div class="box box_2">2</div>
    </div>
    <div class="out_box">
        <div class="box box_3">1</div>
        <div class="box box_4">2</div>
        <div class="box box_5">3</div>
    </div>
    <div class="out_box">
        <div class="box box_6">1</div>
        <div class="box box_7">2</div>
        <div class="box box_8">3</div>
    </div>
    <div class="out_box">
        <div class="box box_9">1</div>
        <div class="box box_10">2</div>
        <div class="box box_11">3</div>
        <div class="box box_12">4</div>
    </div>
</body>
</html>
