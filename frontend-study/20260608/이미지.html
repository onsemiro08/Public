<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 경로
    =>절대경로 : 내컴퓨터로 시작하는 파일의 위치
    - 다른 사용자가 동일한 경로가 없으면
    사용 할 수 없음 
    =>상대경로 : 항상 동일한 위치값을 설정
    - 최상위 폴더 안에서 파일 관리
    - 항상 시작 위치는 최상위 폴더 안부터 시작
    =>절대+상대
    - url/폴더~ -->
    <img src="./img/a.jpg">
    <!-- =>같은 폴더 안에 있는 img폴더 안에 a.jpg 이미지를
    연결해서 사용하기 -->
</body>
</html>
