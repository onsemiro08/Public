
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 1.내부 스타일
    =>head태그의 자식요소로 title 태그 뒤에
    style태그를 삽입하여 작성하는 스타일시트
    =>우선순위가 가장 높음
    =>관리가 힘듬 -->
    <!-- 2.외부스타일
    =>확장자 .css를 사용 파일을 만들고
    동일한 스타일 적용되는 html페이지에 연결 사용함
    =>연결시 위치 head태그 자식요소로 title태그 뒤쪽
    link 태그로 연결작업함 -->
    <link rel="stylesheet" href="./style.css">
    <!-- =>같은 폴더 ./파일명.css -->
</head>
