<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* main_header영역 시작 */
        .main_header{
            /* width: 100%; */
            /* =>가로가 부모영역 안에서 전체 채우기
            =>채우기 영역은 자식이 사용가능한 크기값 의미 */
            /* =>크기 단위값
            =>px 단위 고정크기
            =>% 단위 부모의 크기값에 비율로 조절되는 크기
            자식에게 부모의 크기는 100%
            만약 부모가 1240px 자식이 620x 
            =>620(자식)/1240(부모)=0.5(결과)*100=%단위값
            =>50%=1240*0.5 */
            height: 80px;
            background-color: aqua;
            display: flex;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }
        /* main_header영역 끝 */

        .main_section{
            width: 1240px;
            /* height: 500px; */
            background-color: violet;
            margin: 50px auto;
            /* 1.여백지정 */
            padding: 50px;
            box-sizing: border-box;
        }
        .main_footer{
            /* width: 100%; */
            height: 150px;
            background-color: yellowgreen;
            padding: 30px;
            box-sizing: border-box;
        }
/* .header_con_left{
    width: 80px;
    height: 20px;
    background-color: red;
}
.header_con_center{
    width: 350px;
    height: 20px;
    background-color: red;
}
.header_con_right{
    width: 80px;
    height: 20px;
    background-color: red;
} */
/* .header_con_left,.header_con_center,.header_con_right{
    width: 80px;
    height: 20px;
    background-color: red;
}
.header_con_center{
    width: 350px;
} */
/* 자식선택자
=>부모를 기준으로 자식을 선택함
부모객체선택>자식객체선택 */
.main_header>div{
    /* =>main_header 안에 있는 자식 div를 전체 선택함 */
    width: 80px;
    height: 20px;
    background-color: red;
}
.main_header>.header_con_center{
    width: 350px;
}
/* 우선순위
=>어떤 명령을 우선으로 인식하는지를 확인
=>태그선택<클래스선택<아이디선택
=>선택 범위가 작을수록 높음
=>나중에 작성될 수록 높음 */
.in_footer{
    /* width: 100%; */
    height: 40px;
    background-color: rgb(50, 78, 231);
}
.out_box{
    width: 100%;
    background-color: green;
    margin-bottom: 50px;
    display: flex;
    padding: 30px 40px;
    box-sizing: border-box;
    justify-content: space-between;
}
.out_box:first-child{
    height: 100px;
}

.out_box:last-child{
    margin-bottom: 0;
    justify-content: center;
    gap: 10px;
}
.in_box{
    width: 100px;
    height: 100px;
    background-color: firebrick;
}
    </style>
</head>
<body>
    <div class="main_header">
        <div class="header_con_left"></div>
        <div class="header_con_center"></div>
        <div class="header_con_right"></div>
    </div>
    <div class="main_section">
        <div class="out_box"></div>
        <div class="out_box">
            <div class="in_box"></div>
            <div class="in_box"></div>
        </div>
        <div class="out_box">
            <div class="in_box"></div>
            <div class="in_box"></div>
            <div class="in_box"></div>
        </div>
    </div>
    <div class="main_footer">
        <div class="in_footer"></div>
    </div>
</body>
</html>
